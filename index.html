<!DOCTYPE html><html>
<head>
<title>Surprise 🎁</title><style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at bottom, #020111, #000);
  font-family:Arial;
  color:white;
}

/* Stars */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
}

/* Button */
#btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 30px;
  font-size:20px;
  background:#ff4081;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* Text */
#text{
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:50px;
  opacity:0;
  text-shadow:0 0 20px pink,0 0 40px red;
  transition:2s;
}
</style></head><body><button id="btn" onclick="start()">🎁 Open Surprise</button>

<div id="text">Happy wala Birthday Adeeba 🥳</div><script>

/* Create stars */
for(let i=0;i<80;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.top=Math.random()*window.innerHeight+"px";
  star.style.left=Math.random()*window.innerWidth+"px";
  document.body.appendChild(star);
}

function start(){
  document.getElementById("btn").style.display="none";

  setTimeout(()=>{
    document.getElementById("text").style.opacity=1;
  },2500);

  launchFireworks();
}

/* Fireworks */
function launchFireworks(){
  setInterval(()=>{
    createFirework();
  },600);
}

function createFirework(){
  let x=Math.random()*window.innerWidth;
  let y=Math.random()*window.innerHeight/2;

  for(let i=0;i<25;i++){
    let dot=document.createElement("div");
    dot.style.position="absolute";
    dot.style.width="4px";
    dot.style.height="4px";
    dot.style.borderRadius="50%";
    dot.style.background="hsl("+Math.random()*360+",100%,50%)";

    document.body.appendChild(dot);

    let angle=Math.random()*2*Math.PI;
    let speed=Math.random()*4;

    let dx=Math.cos(angle)*speed;
    let dy=Math.sin(angle)*speed;

    dot.style.left=x+"px";
    dot.style.top=y+"px";

    let life=40;

    let anim=setInterval(()=>{
      x+=dx;
      y+=dy;
      dot.style.left=x+"px";
      dot.style.top=y+"px";
      life--;

      if(life<=0){
        dot.remove();
        clearInterval(anim);
      }
    },30);
  }
}
</script></body>
</html>
